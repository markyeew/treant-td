<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#071407">
<title>Treant Defense</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:#071407;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  touch-action:manipulation;
}
#gc{
  width:100%;
  max-width:430px;
  height:100dvh;
  margin:0 auto;
  background:#0d1f0d;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
#hud{
  background:#071407;
  padding:8px 12px;
  padding-top:max(8px, env(safe-area-inset-top));
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #1a3a1a;
  flex-shrink:0;
  gap:4px;
  flex-wrap:wrap;
}
.hi{display:flex;align-items:center;gap:3px;font-size:12px;color:#a5d6a7}
.hv{font-size:13px;font-weight:500;color:#fff}
#seasonTag{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:#2e7d32;color:#c8e6c9}
#canvasWrap{
  flex:1;
  width:100%;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
#gameCanvas{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
}
#towerPanel{
  background:#071407;
  border-top:1px solid #1a3a1a;
  padding:6px 8px;
  padding-bottom:max(6px, env(safe-area-inset-bottom));
  flex-shrink:0;
}
#swBtn{
  display:block;width:100%;padding:7px;
  background:#1b5e20;border:none;border-radius:8px;
  color:#c8e6c9;font-size:13px;cursor:pointer;
  font-family:inherit;margin-bottom:5px;
  -webkit-tap-highlight-color:transparent;
}
#swBtn:active{background:#2e7d32}
#swBtn:disabled{opacity:0.5;cursor:not-allowed}
#towerRow{display:flex;gap:4px;justify-content:center}
.tb{
  display:flex;flex-direction:column;align-items:center;
  background:#0f2010;border:1.5px solid #2d5a2d;border-radius:8px;
  padding:4px 3px;cursor:pointer;flex:1;min-width:0;
  -webkit-tap-highlight-color:transparent;
}
.tb:active{background:#1a3a1a}
.tb.sel{border-color:#76ff03;background:#143a14}
.tIco{font-size:18px;line-height:1.1}
.tNm{font-size:9px;color:#81c784;text-align:center;line-height:1.2}
.tCt{font-size:9px;color:#ffd54f}
.tTg{font-size:7px;color:#80cbc4}
#msgBar{
  font-size:11px;color:#66bb6a;
  padding:3px 10px;background:#030f03;
  min-height:20px;border-top:1px solid #0f2010;
  text-align:center;flex-shrink:0;
}
.overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:10;align-items:center;justify-content:center}
.overlay.show{display:flex}
.panel{background:#0a1f0a;border:1.5px solid #388e3c;border-radius:12px;padding:14px;min-width:200px;max-width:240px;text-align:center}
.panel h3{color:#c8e6c9;font-size:14px;margin-bottom:4px}
.panel .sub{color:#81c784;font-size:11px;margin-bottom:10px}
.pBtn{display:block;width:100%;padding:7px;margin:4px 0;border-radius:7px;border:1px solid #388e3c;background:#143a14;color:#c8e6c9;font-size:12px;cursor:pointer;font-family:inherit}
.pBtn:active{background:#1b5e20}
.pBtn.sell{border-color:#c62828;background:#3a0a0a;color:#ef9a9a}
.pBtn.cancel{border-color:#444;background:#111;color:#999}
.popup{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:12px;padding:16px 22px;text-align:center;z-index:20;width:240px}
</style>
</head>
<body>
<div id="gc">
  <div id="hud">
    <div class="hi">&#9728;<span class="hv" id="sunV">150</span></div>
    <div class="hi">Seed:<span class="hv" id="livV">3</span></div>
    <div class="hi">Wave:<span class="hv" id="wavV">0</span></div>
    <div class="hi">Score:<span class="hv" id="scrV">0</span></div>
    <div id="seasonTag">Spring</div>
  </div>
  <div id="canvasWrap" style="position:relative">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay" id="tPopOv">
      <div class="panel">
        <h3 id="tPopName">Tower</h3>
        <div class="sub" id="tPopSub"></div>
        <button class="pBtn" id="upBtn" onclick="doUpgrade()">Upgrade</button>
        <button class="pBtn sell" onclick="doSell()">Sell (50% refund)</button>
        <button class="pBtn cancel" onclick="closeTPop()">Cancel</button>
      </div>
    </div>
    <div class="popup" id="wPop" style="background:#071407;border:2px solid #76ff03">
      <h2 style="color:#76ff03;font-size:17px;margin-bottom:4px" id="wPopT">Wave Clear!</h2>
      <p style="color:#c8e6c9;font-size:12px;margin-bottom:10px" id="wPopS"></p>
      <button style="padding:7px 20px;border-radius:8px;border:none;background:#1b5e20;color:#fff;font-size:13px;cursor:pointer;font-family:inherit" onclick="closeWPop()">Next Wave</button>
    </div>
    <div class="popup" id="goPop" style="background:#1a0000;border:2px solid #c62828">
      <h2 style="color:#ef5350;font-size:19px;margin-bottom:6px">The Seed Falls...</h2>
      <p style="color:#ffcdd2;font-size:12px;margin-bottom:12px" id="goSub"></p>
      <button style="padding:8px 24px;border-radius:8px;border:none;background:#b71c1c;color:#fff;font-size:13px;cursor:pointer;font-family:inherit" onclick="restart()">Try Again</button>
    </div>
    <div class="popup" id="eiPop" style="background:#071407;border:2px solid #e65100;width:260px">
      <h2 style="color:#ffa726;font-size:14px;margin-bottom:4px" id="eiT">New Enemy!</h2>
      <div style="font-size:32px;margin:6px 0" id="eiIco">?</div>
      <p style="color:#ffe0b2;font-size:11px;margin-bottom:3px" id="eiD"></p>
      <p style="color:#ffcc80;font-style:italic;font-size:10px;margin:5px 0" id="eiQ"></p>
      <button style="margin-top:8px;padding:6px 18px;border-radius:7px;border:none;background:#e65100;color:#fff;font-size:12px;cursor:pointer;font-family:inherit" onclick="closeEI()">Prepare!</button>
    </div>
  </div>
  <div id="towerPanel">
    <button id="swBtn">Start Wave 1</button>
    <div id="towerRow">
      <div class="tb sel" data-t="oak" onclick="selTower('oak')"><span class="tIco">🌳</span><span class="tNm">Oak</span><span class="tCt">☀80</span><span class="tTg">Ground+</span></div>
      <div class="tb" data-t="pine" onclick="selTower('pine')"><span class="tIco">🌲</span><span class="tNm">Pine</span><span class="tCt">☀60</span><span class="tTg">Air+</span></div>
      <div class="tb" data-t="willow" onclick="selTower('willow')"><span class="tIco">🌿</span><span class="tNm">Willow</span><span class="tCt">☀70</span><span class="tTg">Slow+Air</span></div>
      <div class="tb" data-t="mangrove" onclick="selTower('mangrove')"><span class="tIco">🌴</span><span class="tNm">Mangrove</span><span class="tCt">☀90</span><span class="tTg">Root+Gnd</span></div>
      <div class="tb" data-t="elder" onclick="selTower('elder')"><span class="tIco">🌳</span><span class="tNm">Elder</span><span class="tCt">☀150</span><span class="tTg">All+Boss</span></div>
      <div class="tb" data-t="none" onclick="selTower('none')" style="border-color:#c62828;max-width:52px">
        <span class="tIco" style="font-size:14px">🧑‍🌾</span>
        <span class="tNm" style="color:#ef9a9a;font-size:8px">Manage</span>
        <span class="tNm" style="color:#ef9a9a;font-size:8px">Tower</span>
      </div>
    </div>
  </div>
  <div id="msgBar">Place Treants to block lanes and funnel enemies!</div>
</div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const COLS=9,ROWS=14;
let CELL=40;
const SEED_C=Math.floor(COLS/2),SEED_R=ROWS-1;

function resize(){
  const wrap=document.getElementById('canvasWrap');
  const w=wrap.clientWidth;
  const h=wrap.clientHeight;
  const cellByW=Math.floor(w/COLS);
  const cellByH=Math.floor(h/ROWS);
  CELL=Math.min(cellByW,cellByH);
  canvas.width=COLS*CELL;
  canvas.height=ROWS*CELL;
  canvas.style.width=COLS*CELL+'px';
  canvas.style.height=ROWS*CELL+'px';
}
resize();
window.addEventListener('resize',resize);

const SEASONS=[
  {name:'Spring',bg:'#0d1f0d',tag:'#2e7d32',sunMod:1.2,dmgMod:1.0,spdMod:1.0,rangeMod:1.0,heal:true},
  {name:'Summer',bg:'#1a1a00',tag:'#f57f17',sunMod:1.0,dmgMod:1.15,spdMod:1.0,rangeMod:1.0,heal:false},
  {name:'Autumn',bg:'#1a0d00',tag:'#bf360c',sunMod:1.0,dmgMod:1.0,spdMod:1.12,rangeMod:1.0,heal:false},
  {name:'Winter',bg:'#000d1a',tag:'#1565c0',sunMod:0.5,dmgMod:1.0,spdMod:1.0,rangeMod:0.85,heal:false}
];
const TDEFS={
  oak:     {name:'Oak Treant',  cost:80, hp:220,dmg:25,range:2.5,rate:1.1, col:'#5d4037',canAir:false,gB:1.5,aB:0,  bB:1.25},
  pine:    {name:'Pine Treant', cost:60, hp:110,dmg:18,range:3.5,rate:0.65,col:'#2e7d32',canAir:true, gB:1.0,aB:1.5,bB:1.0},
  willow:  {name:'Willow',      cost:70, hp:100,dmg:8, range:2.8,rate:0.5, col:'#558b2f',canAir:true, gB:1.0,aB:1.3,bB:1.0,slow:true},
  mangrove:{name:'Mangrove',    cost:90, hp:160,dmg:20,range:2.0,rate:1.4, col:'#1b5e20',canAir:false,gB:1.4,aB:0,  bB:1.0,root:true},
  elder:   {name:'Elder Treant',cost:150,hp:300,dmg:45,range:3.8,rate:0.38,col:'#4e342e',canAir:true, gB:1.25,aB:1.25,bB:1.5}
};
const UPS={
  oak:     [{name:'Ancient Oak',  cost:120,hpB:150,dmgB:20,rngB:0.3},{name:'Ironbark Oak',  cost:200,hpB:200,dmgB:30,rngB:0}],
  pine:    [{name:'Elder Pine',   cost:100,hpB:60, dmgB:22,rngB:0.4},{name:'Storm Pine',    cost:180,hpB:80, dmgB:40,rngB:0.6}],
  willow:  [{name:'Weep Willow',  cost:110,hpB:50, dmgB:12,rngB:0.4},{name:'Wrath Willow',  cost:190,hpB:80, dmgB:25,rngB:0.4}],
  mangrove:[{name:'Deep Mangrove',cost:130,hpB:100,dmgB:15,rngB:0.2},{name:'Root Fortress', cost:210,hpB:150,dmgB:30,rngB:0.2}],
  elder:   [{name:'Elder Lord',   cost:200,hpB:200,dmgB:35,rngB:0.4},{name:'World Tree',    cost:350,hpB:300,dmgB:60,rngB:0.8}]
};
const EDEFS={
  goblin: {name:'Goblin Woodcutter',e:'👺',hp:80, spd:0.7,rwd:15,dmg:8, isAir:false,isBoss:false,breaker:false,introW:1,intro:{t:'Goblin Woodcutter',d:'Stays in lane — blocked by towers! Oak & Mangrove deal +50% dmg.',q:'"Chop chop! The forest burns!"'}},
  sprite: {name:'Shadow Sprite',   e:'👻',hp:35, spd:1.8,rwd:20,dmg:3, isAir:false,isBoss:false,breaker:false,introW:3,intro:{t:'Shadow Sprite',d:'Extremely fast. Stays in lane. Pine pierce hits groups!',q:'"You cannot stop what has no shadow..."'}},
  wraith: {name:'Blightborn Wraith',e:'💀',hp:60,spd:1.1,rwd:30,dmg:5, isAir:false,isBoss:false,breaker:false,introW:6,intro:{t:'Blightborn Wraith',d:'Stays in lane. Willow aura works best on it.',q:'"The blight comes for every root..."'}},
  golem:  {name:'Stone Golem',     e:'🗿',hp:400,spd:0.28,rwd:50,dmg:30,isAir:false,isBoss:false,breaker:false,introW:9,intro:{t:'Stone Golem',d:'Massive HP, very slow. Stays in lane. Oak +50% crush!',q:'"Nothing grows where I tread."'}},
  shaman: {name:'Plague Shaman',   e:'🧙',hp:90, spd:0.75,rwd:40,dmg:10,isAir:false,isBoss:false,breaker:false,introW:13,intro:{t:'Plague Shaman',d:'Stays in lane. Buffs nearby enemies!',q:'"The rot spreads. I am inevitable."'}},
  creeper:{name:'Darkvine Creeper',e:'🌱',hp:80, spd:0.9,rwd:35,dmg:14,isAir:false,isBoss:false,breaker:true, introW:11,intro:{t:'Darkvine Creeper',d:'IGNORES tower walls — drifts freely through gaps!',q:'"Every root belongs to the dark now."'}},
  drake:  {name:'Void Drake',      e:'🐉',hp:160,spd:1.4,rwd:60,dmg:15,isAir:true, isBoss:false,breaker:true, introW:17,intro:{t:'Void Drake',d:'FLYING — bypasses all ground towers completely!',q:'"The skies belong to darkness now."'}},
  king:   {name:'The Hollow King', e:'👑',hp:1500,spd:0.4,rwd:200,dmg:50,isAir:false,isBoss:true,breaker:true, introW:20,intro:{t:'The Hollow King',d:'BOSS — smashes through all tower walls! Elder +50% damage.',q:'"Your forest ends here, Ancient One."'}}
};

let sun=150,lives=3,waveNum=0,score=0,seasonIdx=0;
let towers=[],enemies=[],projs=[];
let selType='oak',selTowerIdx=-1;
let waveActive=false,waveClearPending=false,gameOverFlag=false;
let totalToSpawn=0,spawnedCount=0;
let sunTimer=0,lastTime=0;
let introsShown=new Set(),pendingCb=null;

const $=id=>document.getElementById(id);
const msg=t=>{$('msgBar').textContent=t};
const isBlocked=(c,r)=>towers.some(t=>t.c===c&&t.r===r);

function updateHUD(){
  $('sunV').textContent=Math.floor(sun);
  $('livV').textContent=lives;
  $('wavV').textContent=waveNum;
  $('scrV').textContent=score;
  const s=SEASONS[seasonIdx];
  $('seasonTag').textContent=s.name;
  $('seasonTag').style.background=s.tag;
}

function selTower(t){
  selType=t;closeTPop();
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));
  const el=document.querySelector('[data-t="'+t+'"]');
  if(el)el.classList.add('sel');
  const d=TDEFS[t];
  if(d)msg('Placing '+d.name+' ('+d.cost+' sun) — tap any empty cell');
  else msg('Tap any placed tower to upgrade or sell it.');
}

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  let cx,cy;
  if(e.touches){cx=(e.touches[0].clientX-rect.left)*sx;cy=(e.touches[0].clientY-rect.top)*sy;}
  else{cx=(e.clientX-rect.left)*sx;cy=(e.clientY-rect.top)*sy;}
  return{c:Math.floor(cx/CELL),r:Math.floor(cy/CELL)};
}

function onTap(e){
  e.preventDefault();
  if(gameOverFlag||waveClearPending)return;
  const{c,r}=getPos(e);
  if(c<0||c>=COLS||r<0||r>=ROWS)return;
  if(r===SEED_R&&c===SEED_C)return;
  const ti=towers.findIndex(t=>t.c===c&&t.r===r);
  if(ti!==-1){openTPop(ti);return;}
  if(!selType||selType==='none')return;
  const def=TDEFS[selType];
  if(!def)return;
  if(sun<def.cost){msg('Need '+def.cost+' sunlight! Have '+Math.floor(sun));return;}
  sun-=def.cost;
  towers.push({c,r,type:selType,name:def.name,col:def.col,
    hp:def.hp,maxHp:def.hp,dmg:def.dmg,range:def.range,rate:def.rate,
    canAir:def.canAir,gB:def.gB,aB:def.aB,bB:def.bB,
    slow:def.slow||false,root:def.root||false,
    tier:0,totalSpent:def.cost,cooldown:0});
  updateHUD();
  msg(def.name+' planted!');
}

canvas.addEventListener('click',onTap);
canvas.addEventListener('touchstart',onTap,{passive:false});

function openTPop(idx){
  selTowerIdx=idx;
  const t=towers[idx];
  $('tPopName').textContent=t.name+' (Tier '+t.tier+')';
  $('tPopSub').textContent='HP:'+Math.round(t.hp)+'/'+t.maxHp+' | DMG:'+Math.round(t.dmg)+' | Range:'+t.range.toFixed(1);
  const up=UPS[t.type]?.[t.tier];
  const ub=$('upBtn');
  if(up&&t.tier<2){ub.textContent='Upgrade to '+up.name+' ('+up.cost+' sun)';ub.disabled=false;ub.style.opacity='1';}
  else{ub.textContent='Already at max tier';ub.disabled=true;ub.style.opacity='0.4';}
  $('tPopOv').classList.add('show');
}
function closeTPop(){$('tPopOv').classList.remove('show');selTowerIdx=-1;}
function doUpgrade(){
  if(selTowerIdx<0)return;
  const t=towers[selTowerIdx];
  const up=UPS[t.type]?.[t.tier];
  if(!up){closeTPop();return;}
  if(sun<up.cost){msg('Need '+up.cost+' sunlight!');closeTPop();return;}
  sun-=up.cost;t.tier++;
  t.hp=Math.min(t.hp+up.hpB,t.maxHp+up.hpB);t.maxHp+=up.hpB;
  t.dmg+=up.dmgB;t.range+=up.rngB;t.name=up.name;t.totalSpent+=up.cost;
  updateHUD();closeTPop();msg(t.name+' upgraded!');
}
function doSell(){
  if(selTowerIdx<0)return;
  const t=towers[selTowerIdx];
  const ref=Math.floor(t.totalSpent*0.5);
  sun+=ref;towers.splice(selTowerIdx,1);
  updateHUD();closeTPop();msg('Sold for '+ref+' sunlight.');
}
function showEI(key,cb){
  const d=EDEFS[key];if(!d){cb();return;}
  $('eiT').textContent='New Enemy: '+d.intro.t;
  $('eiIco').textContent=d.e;$('eiD').textContent=d.intro.d;$('eiQ').textContent=d.intro.q;
  $('eiPop').style.display='block';pendingCb=cb;
}
function closeEI(){$('eiPop').style.display='none';if(pendingCb){pendingCb();pendingCb=null;}}

function buildWaveList(w){
  const list=[];const count=6+w*2;
  for(let i=0;i<count;i++){
    if(w>=20&&i===0){list.push('king');continue;}
    if(w>=17&&i%6===0){list.push('drake');continue;}
    if(w>=13&&i%7===0){list.push('shaman');continue;}
    if(w>=11&&i%8===0){list.push('creeper');continue;}
    if(w>=9&&i%5===0){list.push('golem');continue;}
    if(w>=6&&i%4===0){list.push('wraith');continue;}
    if(w>=3&&i%3===0){list.push('sprite');continue;}
    list.push('goblin');
  }
  return list;
}

function startWave(){
  if(waveActive||waveClearPending||gameOverFlag)return;
  waveNum++;
  if(waveNum%10===0){seasonIdx=(seasonIdx+1)%4;msg('Season changed to '+SEASONS[seasonIdx].name+'!');}
  updateHUD();
  $('swBtn').disabled=true;$('swBtn').textContent='Wave '+waveNum+' in progress...';
  const list=buildWaveList(waveNum);
  totalToSpawn=list.length;spawnedCount=0;
  enemies=[];projs=[];waveActive=true;waveClearPending=false;
  const newIntros=[];
  list.forEach(k=>{
    const d=EDEFS[k];
    if(d&&d.introW===waveNum&&!introsShown.has(k)){newIntros.push(k);introsShown.add(k);}
  });
  const doSpawn=()=>doSpawnList(list);
  if(newIntros.length>0)showEI(newIntros[0],doSpawn);
  else doSpawn();
}
function doSpawnList(list){
  list.forEach((k,i)=>{
    setTimeout(()=>{if(!waveActive)return;spawnEnemy(k);spawnedCount++;},i*500);
  });
}
function spawnEnemy(key){
  const def=EDEFS[key];if(!def)return;
  const sm=SEASONS[seasonIdx].spdMod;
  const scaledHp=def.hp*(1+waveNum*0.1);
  const col=Math.floor(Math.random()*COLS);
  enemies.push({
    key,e:def.e,col:def.col,name:def.name,
    hp:scaledHp,maxHp:scaledHp,spd:def.spd*sm,rwd:def.rwd,dmg:def.dmg,
    isAir:def.isAir,isBoss:def.isBoss,breaker:def.breaker,
    laneC:col,x:(col+0.5)*CELL,y:-CELL*0.5,
    targetX:(col+0.5)*CELL,sliding:false,
    slowT:0,dead:false,reached:false
  });
}
function onWaveComplete(){
  if(waveClearPending||gameOverFlag)return;
  waveClearPending=true;waveActive=false;
  const bonus=25+waveNum*10;
  const earned=Math.floor(bonus*SEASONS[seasonIdx].sunMod);
  sun+=earned;updateHUD();
  $('wPopT').textContent='Wave '+waveNum+' cleared!';
  $('wPopS').textContent='+'+earned+' sunlight | '+SEASONS[seasonIdx].name;
  $('wPop').style.display='block';
}
function closeWPop(){
  $('wPop').style.display='none';waveClearPending=false;
  $('swBtn').disabled=false;$('swBtn').textContent='Start Wave '+(waveNum+1);
  msg('Adjust towers, then start the next wave!');
}
function triggerGameOver(){
  if(gameOverFlag)return;
  gameOverFlag=true;waveActive=false;
  $('goSub').textContent='Wave: '+waveNum+' | Score: '+score;
  $('goPop').style.display='block';
}
function restart(){
  sun=150;lives=3;waveNum=0;score=0;seasonIdx=0;
  towers=[];enemies=[];projs=[];
  waveActive=false;waveClearPending=false;gameOverFlag=false;
  totalToSpawn=0;spawnedCount=0;introsShown=new Set();
  $('goPop').style.display='none';$('wPop').style.display='none';
  $('swBtn').disabled=false;$('swBtn').textContent='Start Wave 1';
  updateHUD();msg('Place Treants to block lanes and funnel enemies!');
}
$('swBtn').addEventListener('click',()=>{if(!waveActive&&!waveClearPending&&!gameOverFlag)startWave();});

function moveEnemy(en,dt){
  const spd=en.spd*CELL*dt;
  if(en.isAir){en.y+=spd;if(en.y>=ROWS*CELL)en.reached=true;return;}
  if(en.breaker){en.y+=spd;if(en.y>=ROWS*CELL)en.reached=true;return;}
  if(en.sliding){
    const dx=en.targetX-en.x;
    if(Math.abs(dx)<=spd){en.x=en.targetX;en.laneC=Math.round((en.targetX-CELL/2)/CELL);en.sliding=false;}
    else{en.x+=Math.sign(dx)*spd;}
    return;
  }
  const curC=Math.round((en.x-CELL/2)/CELL);
  const curR=Math.floor(en.y/CELL);
  const nextR=curR+1;
  if(nextR<ROWS&&isBlocked(curC,nextR)){
    for(let dist=1;dist<COLS;dist++){
      const tL=curC-dist,tR=curC+dist;
      if(tL>=0&&!isBlocked(tL,nextR)){en.targetX=(tL+0.5)*CELL;en.sliding=true;return;}
      if(tR<COLS&&!isBlocked(tR,nextR)){en.targetX=(tR+0.5)*CELL;en.sliding=true;return;}
    }
    return;
  }
  en.y+=spd;
  if(en.y>=ROWS*CELL)en.reached=true;
}

function update(dt){
  if(gameOverFlag)return;
  const S=SEASONS[seasonIdx];
  sunTimer+=dt;
  if(sunTimer>=1){sunTimer=0;const r=S.sunMod>=1.2?1.5:S.sunMod<=0.5?0.5:1;sun=Math.min(sun+r,999);updateHUD();}
  if(S.heal)towers.forEach(t=>{t.hp=Math.min(t.hp+0.3*dt*60,t.maxHp);});
  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i];
    if(en.dead||en.reached)continue;
    if(en.slowT>0){en.slowT-=dt;continue;}
    moveEnemy(en,dt);
    if(en.reached){lives=Math.max(0,lives-1);updateHUD();if(lives<=0){triggerGameOver();return;}}
  }
  const dm=S.dmgMod,rm=S.rangeMod;
  towers.forEach(t=>{
    t.cooldown=Math.max(0,t.cooldown-dt);if(t.cooldown>0)return;
    const tx=t.c*CELL+CELL/2,ty=t.r*CELL+CELL/2,effR=t.range*CELL*rm;
    let target=null,bestY=-Infinity;
    enemies.forEach(en=>{
      if(en.dead||en.reached)return;
      if(en.isAir&&!t.canAir)return;
      const dx=en.x-tx,dy=en.y-ty;
      if(Math.sqrt(dx*dx+dy*dy)<=effR&&en.y>bestY){bestY=en.y;target=en;}
    });
    if(!target)return;
    t.cooldown=1/t.rate;
    let dmg=t.dmg*dm;
    if(target.isBoss)dmg*=t.bB;else if(target.isAir)dmg*=t.aB;else dmg*=t.gB;
    const dx=target.x-tx,dy=target.y-ty,len=Math.sqrt(dx*dx+dy*dy)||1;
    projs.push({x:tx,y:ty,vx:dx/len*380,vy:dy/len*380,dmg,target,col:t.col,slow:t.slow||false,root:t.root||false,done:false});
  });
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    if(p.done){projs.splice(i,1);continue;}
    if(p.target.dead||p.target.reached){p.done=true;continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    const dx=p.x-p.target.x,dy=p.y-p.target.y;
    if(Math.sqrt(dx*dx+dy*dy)<12){
      p.target.hp-=p.dmg;
      if(p.slow)p.target.slowT=1.8;if(p.root)p.target.slowT=2.8;
      if(p.target.hp<=0){p.target.dead=true;score+=p.target.rwd;sun=Math.min(sun+Math.floor(p.target.rwd*0.3),999);updateHUD();}
      p.done=true;
    }
  }
  if(waveActive&&spawnedCount>=totalToSpawn&&totalToSpawn>0){
    if(enemies.filter(e=>!e.dead&&!e.reached).length===0)onWaveComplete();
  }
}

function render(){
  const S=SEASONS[seasonIdx];
  ctx.fillStyle=S.bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  if(S.name==='Winter'){ctx.fillStyle='rgba(100,160,255,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(S.name==='Autumn'){ctx.fillStyle='rgba(200,80,10,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  if(S.name==='Summer'){ctx.fillStyle='rgba(255,200,0,0.03)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  for(let c=0;c<COLS;c++){ctx.fillStyle=c%2===0?'rgba(255,255,255,0.012)':'rgba(0,0,0,0)';ctx.fillRect(c*CELL,0,CELL,canvas.height);}
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(COLS*CELL,r*CELL);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,ROWS*CELL);ctx.stroke();}
  if(selType&&selType!=='none'){
    for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
      if(r===SEED_R&&c===SEED_C)continue;
      if(towers.some(t=>t.c===c&&t.r===r))continue;
      ctx.fillStyle='rgba(118,255,3,0.07)';ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
    }}
  }
  ctx.fillStyle='rgba(249,168,37,0.3)';ctx.fillRect(SEED_C*CELL,SEED_R*CELL,CELL,CELL);
  ctx.font='bold '+(CELL*0.62)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('★',SEED_C*CELL+CELL/2,SEED_R*CELL+CELL/2);
  ctx.fillStyle='rgba(198,40,40,0.35)';ctx.fillRect(0,0,COLS*CELL,5);
  ctx.fillStyle='#ef9a9a';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('ENEMY SPAWN',COLS*CELL/2,6);
  towers.forEach((t,idx)=>{
    const x=t.c*CELL+CELL/2,y=t.r*CELL+CELL/2;
    if(idx===selTowerIdx){ctx.strokeStyle='rgba(118,255,3,0.45)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,t.range*CELL*S.rangeMod,0,Math.PI*2);ctx.stroke();}
    ctx.fillStyle=t.col;ctx.fillRect(t.c*CELL+2,t.r*CELL+2,CELL-4,CELL-4);
    const im={oak:'🌳',pine:'🌲',willow:'🌿',mangrove:'🌴',elder:'🌳'};
    ctx.font=(CELL*0.52)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(im[t.type]||'🌿',x,y);
    if(t.tier>0){ctx.fillStyle='#ffd54f';ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('T'+t.tier,t.c*CELL+2,t.r*CELL+2);}
    const bw=CELL-6,bh=3,bx=t.c*CELL+3,by=t.r*CELL+CELL-6;
    ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,bh);
    const pct=Math.max(0,t.hp/t.maxHp);
    ctx.fillStyle=pct>0.6?'#66bb6a':pct>0.3?'#ffa726':'#ef5350';ctx.fillRect(bx,by,Math.floor(bw*pct),bh);
  });
  enemies.forEach(en=>{
    if(en.dead||en.reached)return;
    const sz=en.isBoss?CELL*0.8:CELL*0.58;
    if(en.isAir){ctx.globalAlpha=0.7;ctx.fillStyle='rgba(123,31,162,0.3)';ctx.beginPath();ctx.arc(en.x,en.y,CELL*0.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    ctx.font=sz+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(en.e,en.x,en.y);
    const bw=en.isBoss?CELL*1.1:CELL*0.7,bh=3,bx=en.x-bw/2,by=en.y+sz*0.55;
    ctx.fillStyle='#111';ctx.fillRect(bx,by,bw,bh);
    const pct=Math.max(0,en.hp/en.maxHp);
    ctx.fillStyle=en.isAir?'#ce93d8':en.isBoss?'#ff5252':'#e53935';ctx.fillRect(bx,by,Math.floor(bw*pct),bh);
    if(en.slowT>0){ctx.fillStyle='rgba(100,181,246,0.9)';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('SLOW',en.x,en.y-sz*0.72);}
  });
  projs.forEach(p=>{if(p.done)return;ctx.fillStyle=p.col||'#aed581';ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();});
  if(waveActive&&totalToSpawn>0){
    const alive=enemies.filter(e=>!e.dead&&!e.reached).length+Math.max(0,totalToSpawn-spawnedCount);
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,canvas.height-18,canvas.width,18);
    ctx.fillStyle='#a5d6a7';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Enemies remaining: '+alive,canvas.width/2,canvas.height-9);
  }
}

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  if($('eiPop').style.display!=='block')update(dt);
  render();requestAnimationFrame(loop);
}
updateHUD();
msg('Select a tower and tap any cell to place it!');
requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(loop);});
</script>
